# Application
spring.application.name=ecommerce-order-engine
spring.main.web-application-type=servlet
server.port=8080
spring.main.banner-mode=off

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# H2 Console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.root=WARN
logging.level.com.ecommerce=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# App Config
app.reservation.expiry.seconds=120
app.fraud.order.count.limit=3
app.fraud.order.window.minutes=1
app.fraud.high.value.threshold=50000
app.stock.low.threshold=5
